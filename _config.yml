# Welcome to Jekyll!
#
# This config file is meant for settings that affect your whole blog, values
# which you are expected to set up once and rarely edit after that. If you find
# yourself editing this file very often, consider using Jekyll's data files
# feature for the data you need to update frequently.
#
# For technical reasons, this file is *NOT* reloaded automatically when you use
# 'bundle exec jekyll serve'. If you change this file, please restart the server process.

# Site settings
# These are used to personalize your new site. If you look in the HTML files,
# you will see them accessed via {{ site.title }}, {{ site.email }}, and so on.
# You can create any custom variable you would like, and they will be accessible
# in the templates via {{ site.myvariable }}.
title: pBoDS
email: mfsimsek@mcmaster.ca
description: We aim to understand space and time mechanisms of patterning in vertebrate embryonic tissues. For this purpose, we combine 1- quantitative state-of-art microscopy, 2- single cell level analysis of signal dynamics, and 3- data-informed predictive modeling of systems level biophysics. Zebrafish with its translucent, accessible, and multiplexed early embryonic development as well as tractable genetics is our favorite model organism! Broader vision of our research is discovering the conserved mechanisms of sequential segmentation across vertebrates and design principles of morphogen positional information in embryos. We are located at <a href="http://biology.mcmaster.ca" target="_blank">McMaster University</a>. #>- # this means to ignore newlines until "baseurl:"
bluesky_username: pbodslab.bsky.social
github_username: mfsimsek
minimal_mistakes_skin: default
search: true

# Build settings
markdown: kramdown
remote_theme: mmistakes/minimal-mistakes
# Outputting
permalink: /:categories/:title/
paginate: 5 # amount of posts to show
paginate_path: /page:num/
timezone: # https://en.wikipedia.org/wiki/List_of_tz_database_time_zones

include:
  - _pages

# Exclude from processing.
# The following items will not be processed, by default. Create a custom list
# to override the default setting.
# exclude:
#   - Gemfile
#   - Gemfile.lock
#   - node_modules
#   - vendor/bundle/
#   - vendor/cache/
#   - vendor/gems/
#   - vendor/ruby/

# Plugins (previously gems:)
plugins:
  - jekyll-paginate
  - jekyll-sitemap
  - jekyll-gist
  - jekyll-feed
  - jemoji
  - jekyll-include-cache

author:
  name   : "pBoDS Lab"
  avatar : "/assets/images/lablogo_new.png"
  bio    : "We are a diverse group of undergraduate and graduate researchers inquiring about the conserved mechanisms of sequential segmentation in vertebrate embryos and design principles of morphogen positional information in embryos. We are located at <a href="http://biology.mcmaster.ca" target="_blank">McMaster University</a>."
  links:
    - label: "Website"
      icon: "fas fa-fw fa-link"
      url: "https://"
    - label: "Twitter"
      icon: "fab fa-fw fa-twitter-square"
      url: "https://twitter.com/"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/"
    - label: "Instagram"
      icon: "fab fa-fw fa-instagram"
      url: "https://instagram.com/"

footer:
  links:
    - label: "Bluesky"
      icon: "fab fa-fw fa-bsky-square"
      url: "https://bsky.app/pbodslab.bsky.social"
    - label: "GitHub"
      icon: "fab fa-fw fa-github"
      url: "https://github.com/mfsimsek"

defaults:
  # _posts
  - scope:
      path: ""
      type: members
    values:
      layout: splash
      author_profile: false
      read_time: true
      comments: false
      share: true
      related: true
  # _pages
  - scope:
      path: "_pages"
      type: pages
    values:
      layout: splash
      author_profile: true
      read_time: true
      comments: false
      share: true
      related: true

category_archive:
  type: liquid
  path: /projects/
tag_archive:
  type: liquid
  path: /tags/
